  <style>
    /* BASE */
    body.page-about { background:#FDFCF9; overflow:hidden; height:100%; }

    /* INKWELL */
    #inkwell {
      position:fixed; top:220px; left:50%; transform:translateX(-50%);
      z-index:45; opacity:0; transition:opacity .7s ease; pointer-events:none;
    }
    #inkwell.vis { opacity:1; }

    /* CARTE SCROLL HINT — liquid glass, visible dès le départ */
    #scroll-hint-card {
      position:fixed; top:318px; left:50%; transform:translateX(-50%);
      display:inline-flex; align-items:center; gap:.75rem;
      padding:.65rem 1.5rem; border-radius:999px;
      background:rgba(253,252,249,.58);
      backdrop-filter:blur(22px) saturate(1.3);
      -webkit-backdrop-filter:blur(22px) saturate(1.3);
      border:1px solid rgba(30,26,20,.11);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 4px 18px rgba(30,26,20,.07);
      font-family:'Bitter',serif; font-size:.78rem; letter-spacing:.1em;
      color:rgba(30,26,20,.7);
      z-index:44; white-space:nowrap; opacity:0; pointer-events:none;
      transition:opacity .7s ease;
    }
    #scroll-hint-card.vis  { opacity:1; }
    #scroll-hint-card.gone { opacity:0; transition:opacity .5s ease; }

    /* SÉPARATEUR */
    #ink-rule {
      position:fixed; top:299px; left:50%; transform:translateX(-50%);
      height:1px; width:0; background:rgba(28,24,20,.10); z-index:44;
      transition:width 1.6s cubic-bezier(.22,1,.36,1) .6s;
    }
    #ink-rule.expanded { width:min(460px,82vw); }

    /* STAGE — masque blanc couvrant la zone encrier/nav */
    #stage {
      position:fixed; inset:0;
      display:flex; align-items:flex-start; justify-content:center;
      padding:360px 2.5rem 8rem;
      z-index:30; pointer-events:none; overflow:hidden;
    }
    #stage::before {
      content:''; position:absolute; top:0; left:0; right:0; height:374px;
      background:linear-gradient(to bottom,#FDFCF9 0%,#FDFCF9 88%,transparent 100%);
      pointer-events:none; z-index:2;
    }
    #stage::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:7rem;
      background:linear-gradient(to bottom,transparent,#FDFCF9 72%);
      pointer-events:none; z-index:2;
    }

    /* TEXTE */
    #tw {
      max-width:600px; width:100%; text-align:center;
      font-family:'Playfair Display','Young Serif',Georgia,serif;
      font-size:clamp(1.05rem,1.85vw,1.55rem); line-height:1.88;
      color:#1E1A14; font-style:italic;
      will-change:transform; position:relative; z-index:1;
    }
    #tw p { margin-top:1.05em; }
    #tw p:first-child { margin-top:0; }

    /* CHARS */
    .c   { color:#FDFCF9; transition:color .05s linear; }
    .c.v { color:#1E1A14; }
    /* RATURES — contrôlées par JS, plus de CSS animation */
    .sg-wrap  { display:inline-block; position:relative; vertical-align:baseline; }
    .sg-inner { display:inline; }
    .sk-svg   {
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      width:100%; height:10px; overflow:visible; pointer-events:none;
    }
    .sk-l1 { stroke:#1E1A14; stroke-width:1.5; stroke-dasharray:108; stroke-dashoffset:108; }
    .sk-l2 { stroke:#1E1A14; stroke-width:.7;  stroke-dasharray:108; stroke-dashoffset:108; opacity:.55; }
    /* Pas de CSS animation : le strokeDashoffset est géré en JS,
       synchronisé avec la position de la plume sur les lettres. */

    /* PLUME */
    #quill {
      position:fixed; pointer-events:none; z-index:55; opacity:0;
      transform-origin:50% 98.3%; transform:rotate(-28deg);
      transition:opacity .9s ease; will-change:left,top; overflow:visible;
    }
    #quill.vis { opacity:1; }

    @keyframes qwob {
      0%  {transform:rotate(-27.0deg) translateY(0.0px)}
      14% {transform:rotate(-30.5deg) translateY(0.4px)}
      28% {transform:rotate(-28.0deg) translateY(0.1px)}
      42% {transform:rotate(-31.0deg) translateY(0.6px)}
      57% {transform:rotate(-26.5deg) translateY(-0.2px)}
      72% {transform:rotate(-29.5deg) translateY(0.3px)}
      86% {transform:rotate(-27.5deg) translateY(0.0px)}
      100%{transform:rotate(-27.0deg) translateY(0.0px)}
    }
    #quill.writing { animation:qwob 1.15s ease-in-out infinite; }

    @keyframes qdip {
      0%  {transform:rotate(-28deg) translateY(0)}
      28% {transform:rotate(-25deg) translateY(15px)}
      55% {transform:rotate(-25deg) translateY(12px)}
      74% {transform:rotate(-27deg) translateY(5px)}
      100%{transform:rotate(-28deg) translateY(0)}
    }
    #quill.dipping { animation:qdip 1.2s cubic-bezier(.4,0,.2,1) forwards; }

    @keyframes qrest {
      0%,100%{transform:rotate(-28deg) translateY(0)}
      50%    {transform:rotate(-29.5deg) translateY(1.5px)}
    }
    #quill.resting { animation:qrest 3.2s ease-in-out infinite; }

    @keyframes flamme{0%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(.7) scaleY(1.35) translateY(-1px)}100%{transform:scaleX(1) scaleY(1)}}
    @keyframes encre-pulse{0%,72%,100%{opacity:0}42%,55%{opacity:.85}}

    /* DOT */
    #dot{position:fixed;width:3px;height:3px;border-radius:50%;background:#1E1A14;transform:translate(-50%,-50%);pointer-events:none;z-index:56;left:-50px;top:-50px;opacity:0;transition:opacity .3s}
    #dot.vis{opacity:.55}
    @keyframes dblink{0%,44%{opacity:.55}50%,100%{opacity:0}}
    #dot.writing{animation:dblink 1s steps(1) infinite}

    /* DROPS */
    #drops-layer{position:fixed;inset:0;pointer-events:none;z-index:54;overflow:hidden}
    .ink-drop{position:absolute;border-radius:50%;background:#1C1610}


    /* CTA — Liquid Glass Pills */
    #cta-wrap {
      position:fixed; left:50%; transform:translateX(-50%);
      display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 1.6s ease; z-index:38; white-space:nowrap;
    }
    #cta-wrap.on { opacity:1; pointer-events:all; }
    .cta-pill {
      display:inline-flex; align-items:center; gap:.65rem;
      padding:.75rem 1.8rem; border-radius:999px;
      backdrop-filter:blur(22px) saturate(1.35);
      -webkit-backdrop-filter:blur(22px) saturate(1.35);
      font-family:'Bitter',serif; font-size:.72rem;
      letter-spacing:.28em; text-transform:uppercase;
      text-decoration:none; cursor:pointer;
      transition:transform .4s cubic-bezier(.22,1,.36,1), box-shadow .4s ease, border-color .4s ease, background .4s ease;
    }
    /* Contact — teinte ambre/or */
    a.cta-pill-contact {
      background:rgba(176,132,90,.18);
      border:1px solid rgba(176,132,90,.35);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.72), 0 6px 28px rgba(176,132,90,.1);
      color:#6B4A22;
    }
    a.cta-pill-contact:hover {
      background:rgba(176,132,90,.28);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8), 0 14px 40px rgba(176,132,90,.18);
      border-color:rgba(176,132,90,.55);
    }
    /* Reset — teinte encre sombre */
    button.cta-pill-reset {
      background:rgba(30,26,20,.08);
      border:1px solid rgba(30,26,20,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.65), 0 6px 28px rgba(30,26,20,.07);
      color:#1E1A14;
    }
    button.cta-pill-reset:hover {
      background:rgba(30,26,20,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75), 0 14px 40px rgba(30,26,20,.12);
      border-color:rgba(30,26,20,.3);
    }
    .cta-pill:hover { transform:translateY(-3px); }
    .cta-pill svg { overflow:visible; flex-shrink:0; }
    .cta-pill-contact .arr { transition:transform .4s cubic-bezier(.22,1,.36,1); }
    .cta-pill-contact:hover .arr { transform:translateX(5px); }
    .cta-pill-reset .arr { transition:transform .4s cubic-bezier(.22,1,.36,1); }
    .cta-pill-reset:hover .arr { transform:translateY(-4px); }

    /* BOUTON RETOUR EN HAUT */
    #btn-top {
      position:fixed; bottom:2rem; right:2rem;
      width:38px; height:38px; border-radius:50%;
      background:rgba(253,252,249,.55);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(30,26,20,.14);
      box-shadow:0 2px 12px rgba(30,26,20,.08);
      cursor:pointer; color:rgba(30,26,20,.52);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity .4s ease, transform .3s ease, background .3s ease;
      z-index:25;
    }
    #btn-top.vis { opacity:1; pointer-events:all; }
    #btn-top:hover { background:rgba(253,252,249,.8); transform:translateY(-2px); color:rgba(30,26,20,.8); }

    /* PAGE LABEL */
    #plbl{position:fixed;top:1.5rem;right:2rem;font-family:'Bitter',serif;font-size:.52rem;letter-spacing:.36em;text-transform:uppercase;color:rgba(30,26,20,.22);white-space:nowrap;z-index:20;opacity:0;transition:opacity .9s ease}
    #plbl.vis{opacity:1}

    /* PROGRESS */
    #prog{position:fixed;left:1.8rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;z-index:20;opacity:0;transition:opacity .9s ease}
    #prog.vis{opacity:1}
    .pd{width:3px;height:3px;border-radius:50%;background:rgba(30,26,20,.14);transition:background .4s,transform .4s}
    .pd.on{background:rgba(30,26,20,.52);transform:scale(1.3)}

    /* SCROLL HINT — plus visible */
    #hint {
      position:fixed; bottom:3rem; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:.6rem;
      z-index:20; opacity:0; pointer-events:none; transition:opacity .6s ease;
    }
    #hint.vis  { opacity:1; }
    #hint.gone { display:none; }
    .hint-label {
      font-family:'Bitter',Georgia,serif;
      font-size:1rem; letter-spacing:.12em; color:rgba(30,26,20,.62);
      white-space:nowrap;
    }
    .hint-arrow { display:block; }
    @keyframes hint-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
    .hint-arrow { animation:hint-bob 2.2s ease-in-out infinite; }
    @keyframes hpulse{0%,100%{opacity:.45;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(-3px)}}
    #hint.vis { animation:hpulse 2.8s ease-in-out 1s infinite; }

    /* BLOTS */
    .ink-blot{position:fixed;pointer-events:none;z-index:3;overflow:visible}
    body.page-about .site-footer{display:none}

    /* RESPONSIVE */
    @media(max-width:680px){
      #inkwell          { top:140px; }
      #ink-rule         { top:218px; }
      #scroll-hint-card { top:238px; font-size:.7rem; padding:.55rem 1.1rem; }
      #stage            { padding:310px 1.4rem 7rem; }
      #stage::before    { height:320px; }
      #tw               { font-size:clamp(.95rem,5vw,1.18rem); line-height:1.76; }
      #plbl,#prog       { display:none; }
    }
    @media(max-width:480px){
      #cta-wrap { flex-direction:column; align-items:center; gap:.75rem; }
      .cta-pill { padding:.65rem 1.4rem; font-size:.65rem; }
    }
    @media(max-width:380px){ #stage { padding:262px 1rem 6rem; } }
  </style>
</head>

  <script>
  'use strict';

  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  /* ═══ SCROLL VIRTUEL ══════════════════════════════════════════
     Molette : bloquée pendant isDipping.
     Vitesse plafonnée par MAX_WHEEL_STEP.
  ════════════════════════════════════════════════════════════ */
  const VIRT_DIST      = 6400;
  const WHEEL_FACTOR   = 0.38;
  const MAX_WHEEL_STEP = 78;
  const SCROLL_LERP    = 0.068;

  let scrollTarget  = 0;
  let virtualScroll = 0;
  let prevVirtual   = 0;

  function canScroll() { return !isDipping; }

  window.addEventListener('wheel', e => {
    e.preventDefault();
    if (!canScroll()) return;
    const step = Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY) * WHEEL_FACTOR, MAX_WHEEL_STEP);
    scrollTarget = Math.max(0, Math.min(VIRT_DIST, scrollTarget + step));
  }, { passive: false });

  window.addEventListener('keydown', e => {
    const STEP = 130;
    if ([' ','ArrowDown','PageDown'].includes(e.key)) {
      e.preventDefault();
      if (canScroll()) scrollTarget = Math.min(VIRT_DIST, scrollTarget + STEP);
    } else if (['ArrowUp','PageUp'].includes(e.key)) {
      e.preventDefault();
      if (canScroll()) scrollTarget = Math.max(0, scrollTarget - STEP);
    } else if (e.key === 'Home') { e.preventDefault(); scrollTarget = 0; }
    else if (e.key === 'End')   { e.preventDefault(); scrollTarget = VIRT_DIST; }
  });

  let touchY0 = null;
  window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (touchY0 === null || !canScroll()) return;
    const dy = (touchY0 - e.touches[0].clientY) * 1.15;
    touchY0 = e.touches[0].clientY;
    scrollTarget = Math.max(0, Math.min(VIRT_DIST, scrollTarget + dy));
  }, { passive: true });
  window.addEventListener('touchend', () => { touchY0 = null; }, { passive: true });

  /* ═══ CONTENU ════════════════════════════════════════════ */
  const PARAGRAPHS = [
    {lines:[
      [{t:'tx',v:'Je suis photographe, '},{t:'sk',v:'quelqu\u2019un qui d\u00e9clenche au hasard',id:'s0'},{t:'tx',v:'. Quelqu\u2019un qui choisit.'}],
      [{t:'tx',v:'Quelqu\u2019un qui attend, que la lumi\u00e8re, le sujet et surtout le moment coexistent.'}],
      [{t:'tx',v:'J\u2019ai toujours aim\u00e9 la photographie, ce n\u2019est donc pas tout \u00e0 fait une passion r\u00e9cente.'}],
      [{t:'tx',v:'Mais j\u2019ai r\u00e9ellement commenc\u00e9 en 2024.'}]
    ]},
    {lines:[
      [{t:'tx',v:'J\u2019ai commenc\u00e9 l\u2019orgue \u00e0 l\u2019\u00e2ge de six ans.'}],
      [{t:'tx',v:'J\u2019ai toujours \u00e9t\u00e9 profond\u00e9ment sensible \u00e0 l\u2019art.'}],
      [{t:'tx',v:'Je vois l\u2019art comme l\u2019\u00e9clat divin que dieu a mis dans les hommes.'}],
      [{t:'tx',v:'Cette fa\u00e7on d\u2019\u00e9couter et de regarder ne m\u2019a jamais quitt\u00e9.'}],
      [{t:'tx',v:'Elle est devenue mon regard, '},{t:'sk',v:'juste une mani\u00e8re de voir',id:'s1'},{t:'tx',v:'.'}],
      [{t:'tx',v:'L\u2019image est pour moi une fa\u00e7on '},{t:'sk',v:'de capturer des moments',id:'s2'},{t:'tx',v:'.'}],
      [{t:'tx',v:'De partager ce que je trouve beau, et par-dessus tout vrai.'}],
      [{t:'tx',v:'Une mani\u00e8re '},{t:'sk',v:'de suivre des tendances',id:'s3'},{t:'tx',v:'.'}],
      [{t:'tx',v:'De rendre visible ce qui pourrait passer inaper\u00e7u.'}]
    ]},
    {lines:[
      [{t:'tx',v:'J\u2019ai r\u00e9alis\u00e9 de nombreuses prestations priv\u00e9es.'}],
      [{t:'tx',v:'Chaque rencontre nourrit ma fa\u00e7on de travailler.'}],
      [{t:'tx',v:'C\u2019est important, je ne souhaite pas m\u2019imposer de style.'}],
      [{t:'tx',v:'Parce que je peux y apporter ma vision.'}]
    ]},
    {lines:[
      [{t:'tx',v:'Je m\u2019adapte toujours aux personnes, aux lieux, aux attentes.'}],
      [{t:'tx',v:'Une pr\u00e9sence, une mise en sc\u00e8ne permanente discr\u00e8te, une attention.'}],
      [{t:'tx',v:'Je souhaite travailler, '},{t:'sk',v:'remplir un feed',id:'s4'},{t:'tx',v:'.'}],
      [{t:'tx',v:'Pour des musiciens, des lieux, des projets.'}],
      [{t:'tx',v:'Pour ce qui a du sens '},{t:'sk',v:'produire \u00e0 vide',id:'s5'},{t:'tx',v:'. Une n\u00e9cessit\u00e9.'}]
    ]},
    {lines:[
      [{t:'tx',v:'Je veux '},{t:'sk',v:'tout montrer',id:'s6'},{t:'tx',v:'.'}],
      [{t:'tx',v:'Tout ce qui m\u00e9rite d\u2019\u00eatre vu.'}],
      [{t:'tx',v:'Je cherche '},{t:'sk',v:'la perfection',id:'s7'},{t:'tx',v:'.'}],
      [{t:'tx',v:'Tout ce que je peux faire avec justesse.'}]
    ]}
  ];

  /* ═══ BUILD DOM ═════════════════════════════════════════ */
  const tw=document.getElementById('tw'),spans=[],triggers=[];
  let total=0;
  const paraCharEnds=[];
  const NS='http://www.w3.org/2000/svg';

  PARAGRAPHS.forEach(para=>{
    const p=document.createElement('p');
    para.lines.forEach((line,li)=>{
      if(li>0)p.appendChild(document.createElement('br'));
      line.forEach(seg=>{
        if(seg.t==='tx'){
          for(const ch of seg.v){const s=document.createElement('span');s.className='c';s.textContent=ch;p.appendChild(s);spans.push(s);total++;}
        }else{
          const w=document.createElement('span');w.className='sg-wrap';w.id=seg.id;
          const inn=document.createElement('span');inn.className='sg-inner';
          const wordStart=total; /* index du premier char du mot barré */
          for(const ch of seg.v){const s=document.createElement('span');s.className='c';s.textContent=ch;inn.appendChild(s);spans.push(s);total++;}
          w.appendChild(inn);
          /* SVG rature — dashoffset contrôlé en JS (synchronisé avec la plume) */
          const sv=document.createElementNS(NS,'svg');sv.setAttribute('class','sk-svg');sv.setAttribute('viewBox','0 0 100 10');sv.setAttribute('preserveAspectRatio','none');sv.setAttribute('aria-hidden','true');
          const l1=document.createElementNS(NS,'path');l1.setAttribute('class','sk-l1');l1.setAttribute('d','M1,5 C18,3 38,6.5 52,4 C66,1.5 82,5.8 99,4.2');l1.setAttribute('fill','none');l1.setAttribute('stroke-linecap','round');
          const l2=document.createElementNS(NS,'path');l2.setAttribute('class','sk-l2');l2.setAttribute('d','M2,5.8 C22,7.2 42,3.2 62,5.5 C78,7.2 93,3.5 98,5.2');l2.setAttribute('fill','none');l2.setAttribute('stroke-linecap','round');
          sv.appendChild(l1);sv.appendChild(l2);w.appendChild(sv);p.appendChild(w);
          triggers.push({startAt:wordStart, at:total-1, id:seg.id});
        }
      });
    });
    paraCharEnds.push(total);tw.appendChild(p);
  });

  const progEl=document.getElementById('prog');
  PARAGRAPHS.forEach((_,i)=>{const d=document.createElement('div');d.className='pd';d.id='pd'+i;progEl.appendChild(d);});

  /* ═══ REFS ══════════════════════════════════════════════ */
  const quillEl       =document.getElementById('quill'),
        dotEl         =document.getElementById('dot'),
        inkwellEl     =document.getElementById('inkwell'),
        inkRule       =document.getElementById('ink-rule'),
        scrollHintEl  =document.getElementById('scroll-hint-card'),
        hintEl        =document.getElementById('hint'),
        ctaWrapEl     =document.getElementById('cta-wrap'),
        plblEl        =document.getElementById('plbl'),
        dropsLayer    =document.getElementById('drops-layer'),
        btnTop        =document.getElementById('btn-top');

  /* ═══ PLUME — géométrie responsive ══════════════════════
     FIX RESPONSIVE : NIB_X/NIB_Y calculés selon la taille
     réelle de l'élément SVG (redimensionné en CSS).
  ════════════════════════════════════════════════════════ */
  function applyQuillSize(){
    const mobile = window.innerWidth <= 680;
    const w = mobile ? 44 : 56;
    const h = mobile ? 136 : 172;
    quillEl.setAttribute('viewBox','-40 -210 80 245');
    quillEl.style.width  = w + 'px';
    quillEl.style.height = h + 'px';
  }
  applyQuillSize();

  function getNib(){
    const r = quillEl.getBoundingClientRect();
    return { x: r.width * 0.5, y: r.height * 0.983 };
  }

  function inkwellEntry(){const r=inkwellEl.getBoundingClientRect();return{x:r.left+r.width*.5,y:r.top+r.height*.28};}

  let qx=0,qy=0;
  function placeQuill(nx,ny){
    const nib=getNib();
    quillEl.style.left=(nx-nib.x)+'px';
    quillEl.style.top =(ny-nib.y)+'px';
    dotEl.style.left  =nx+'px';
    dotEl.style.top   =ny+'px';
  }

  /* ═══ DROPS ══════════════════════════════════════════════ */
  function spawnDrops(x,y,count,spread){
    spread=spread||8;
    for(let i=0;i<count;i++){
      const el=document.createElement('div');
      const size=1.2+Math.random()*2.8,dx=(Math.random()-.5)*spread*2;
      const fall=10+Math.random()*18,dur=.4+Math.random()*.45,opa=.28+Math.random()*.35;
      el.className='ink-drop';
      el.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(x+dx-size/2)+'px;top:'+(y-size/2)+'px;opacity:'+opa+';transition:transform '+dur+'s cubic-bezier(.2,.8,.4,1),opacity '+(dur+.12)+'s ease;';
      dropsLayer.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.transform='translateY('+fall+'px)';el.style.opacity='0';}));
      setTimeout(()=>el.remove(),(dur+.35)*1000);
    }
  }

  /* ═══ DIPPING ════════════════════════════════════════════ */
  let isDipping=false,lastDippedPara=-1,isParked=false;
  const DIP_AT=[1,3];
  function getParaIdx(n){for(let i=0;i<paraCharEnds.length;i++)if(n<=paraCharEnds[i])return i;return paraCharEnds.length;}

  function triggerDip(isReturn){
    if(isDipping)return;isDipping=true;isParked=false;
    const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;
    quillEl.classList.add('dipping');
    quillEl.classList.remove('writing','resting');
    dotEl.classList.remove('vis','writing');
    /* Scroll bloqué pendant isDipping (voir canScroll()) */
    setTimeout(()=>spawnDrops(ie.x,ie.y+10,3,5),360);
    setTimeout(()=>spawnDrops(ie.x,ie.y+4, 2,3),500);
    setTimeout(()=>{
      quillEl.classList.remove('dipping');
      isDipping=false;
      if(isReturn){quillEl.classList.add('resting');isParked=true;}
    },1250);
  }

  /* ═══ DROPS D'ÉCRITURE ═══════════════════════════════════ */
  let wdc=0;
  function maybeWriteDrop(n){
    if(++wdc<32)return;wdc=0;
    const wp=writingPos(n);if(wp)spawnDrops(wp.x,wp.y+1,1,3);
  }

  /* ═══ VIEWPORT TRACKING ══════════════════════════════════ */
  let twY=0,targetTwY=0;
  const TW_LERP=.042,WRITE_ZONE=.56;

  function updateTwPosition(n){
    if(n<=0){targetTwY=0;return;}
    if(n>=total)return;
    const wp=writingPos(Math.min(n,spans.length-1));if(!wp)return;
    const zY=window.innerHeight*WRITE_ZONE;
    if(wp.y>zY)              targetTwY=Math.min(0,zY-(wp.y-twY));
    else if(wp.y<zY*.35&&targetTwY<0) targetTwY=Math.min(0,zY-(wp.y-twY));
  }

  /* ═══ INDEX ══════════════════════════════════════════════ */
  function targetIdx(){return(virtualScroll/VIRT_DIST)*total;}

  /* ═══ SYNC CHARS ══════════════════════════════════════════ */
  let revN=0;
  function syncChars(n){
    if(n>revN){for(let i=revN;i<n&&i<spans.length;i++){spans[i].classList.add('v');}}
    else if(n<revN){for(let i=revN-1;i>=n&&i>=0;i--){spans[i].classList.remove('v');}}
    revN=Math.max(0,Math.min(n,spans.length));
  }

  /* ═══ RATURES — LA PLUME BARRE LES MOTS ════════════════════
     Le strokeDashoffset est mis à jour à chaque frame,
     proportionnellement au nombre de caractères du mot barré
     déjà révélés. Ainsi la ligne se dessine PENDANT que la
     plume écrit chaque lettre du mot — pas après.
  ═══════════════════════════════════════════════════════════ */
  function updateStrikes(n){
    triggers.forEach(tr=>{
      const el=document.getElementById(tr.id);if(!el)return;
      const l1=el.querySelector('.sk-l1');
      const l2=el.querySelector('.sk-l2');

      if(n>tr.at){
        /* Mot entièrement écrit et passé : rature complète */
        if(l1)l1.style.strokeDashoffset='0';
        if(l2)l2.style.strokeDashoffset='0';
      }else if(n>=tr.startAt){
        /* La plume est en train d'écrire ce mot */
        const wordLen=Math.max(1,tr.at-tr.startAt);
        const progress=(n-tr.startAt)/wordLen; /* 0→1 */
        if(l1)l1.style.strokeDashoffset=String(108*(1-progress));
        /* Deuxième trait légèrement décalé */
        if(l2)l2.style.strokeDashoffset=String(108*(1-Math.max(0,progress-.28)/.72));
      }else{
        /* Mot pas encore atteint : rature effacée */
        if(l1)l1.style.strokeDashoffset='108';
        if(l2)l2.style.strokeDashoffset='108';
      }
    });
  }

  /* ═══ POSITION D'ÉCRITURE ════════════════════════════════ */
  function writingPos(n){
    const i=Math.min(n,spans.length-1);if(i<0)return null;
    const r=spans[i].getBoundingClientRect();
    if(r.width>.5)return{x:r.left+r.width*.2,y:r.top+r.height*.68};
    for(let j=i-1;j>=0;j--){const rj=spans[j].getBoundingClientRect();if(rj.width>.5)return{x:rj.right+1,y:rj.top+rj.height*.68};}
    return null;
  }

  function updateProg(n){paraCharEnds.forEach((end,i)=>{const d=document.getElementById('pd'+i);if(d)d.classList.toggle('on',n>=end);});}

  /* ═══ RESET COMPLET ═══════════════════════════════════════ */
  function resetAll(){
    scrollTarget=0;virtualScroll=0;prevVirtual=0;curIdx=0;
    /* Chars → tous invisibles instantanément */
    for(const s of spans)s.classList.remove('v','trace');
    revN=0;
    /* Ratures */
    triggers.forEach(tr=>{
      const el=document.getElementById(tr.id);if(!el)return;
      const l1=el.querySelector('.sk-l1');const l2=el.querySelector('.sk-l2');
      if(l1)l1.style.strokeDashoffset='108';if(l2)l2.style.strokeDashoffset='108';
    });
    /* CTA */
    ctaWrapEl.classList.remove('on');ctaWrapEl.style.top='';
    /* État */
    done=false;lastDippedPara=-1;isParked=false;
    targetTwY=0;twY=0;tw.style.transform='';
    /* Plume */
    quillEl.classList.remove('writing');quillEl.classList.add('resting');isParked=true;
    const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;qx=ie.x;qy=ie.y;placeQuill(qx,qy);
    /* Hint */
    hintEl.classList.remove('gone');hintEl.classList.add('vis');
    scrollHintEl.classList.remove('gone');scrollHintEl.classList.add('vis');
    if(btnTop)btnTop.classList.remove('vis');
    updateProg(0);
  }

  btnTop.addEventListener('click', resetAll);

  /* ═══ MAIN LOOP ═══════════════════════════════════════════ */
  let curIdx=0,tNibX=0,tNibY=0,done=false,started=false;
  const IDX_LERP=.072,NIB_LERP=.18;

  let returnQuillTimer=null,quillReturnPending=false;
  function scheduleQuillReturn(){
    if(quillReturnPending)return;quillReturnPending=true;
    clearTimeout(returnQuillTimer);
    returnQuillTimer=setTimeout(()=>{
      if(virtualScroll<prevVirtual+2&&!isDipping&&started)triggerDip(true);
      quillReturnPending=false;
    },320);
  }

  function loop(){
    /* Scroll virtuel */
    virtualScroll+=(scrollTarget-virtualScroll)*SCROLL_LERP;
    const scrollingBack=virtualScroll<prevVirtual-.08;

    const ti=targetIdx();
    curIdx+=(ti-curIdx)*IDX_LERP;
    const n=Math.round(curIdx);

    if(started){
      /* Quand done=true : texte gelé, on ne touche plus aux chars ni à la position */
      if(!done){
        syncChars(n);
        updateStrikes(n);
        updateTwPosition(n);
        twY+=(targetTwY-twY)*TW_LERP;
        tw.style.transform='translateY('+twY.toFixed(2)+'px)';
      }
      updateProg(n);
      if(btnTop)btnTop.classList.toggle('vis', virtualScroll > VIRT_DIST * 0.10);
      if(scrollTarget>15){hintEl.classList.add('gone');scrollHintEl.classList.add('gone');}
    } else {
      twY+=(targetTwY-twY)*TW_LERP;
      tw.style.transform='translateY('+twY.toFixed(2)+'px)';
    }

    if(started&&!done){
      if(n<=0){
        if(!isParked){quillEl.classList.remove('writing');quillEl.classList.add('resting');dotEl.classList.remove('vis','writing');isParked=true;}
        const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;
      }else if(n<total){
        if(scrollingBack){
          quillEl.classList.remove('writing');dotEl.classList.remove('writing');
          isParked=false;
          const ie=inkwellEntry();
          tNibX+=(ie.x-tNibX)*.055;tNibY+=(ie.y-tNibY)*.055;
          scheduleQuillReturn();
          lastDippedPara=Math.min(lastDippedPara,getParaIdx(n)-1);
        }else{
          quillReturnPending=false;clearTimeout(returnQuillTimer);isParked=false;
          if(!isDipping){
            const np=getParaIdx(n);
            if(DIP_AT.indexOf(np)!==-1&&lastDippedPara<np){lastDippedPara=np;triggerDip(false);}
          }
          if(!isDipping){
            const wp=writingPos(n);if(wp){tNibX=wp.x;tNibY=wp.y;}
            quillEl.classList.add('writing');quillEl.classList.remove('resting');
            dotEl.classList.add('vis','writing');
            maybeWriteDrop(n);
          }
        }
        hintEl.classList.add('gone');
      }else if(n>=total){
        /* Tout écrit — figer l'état */
        done=true;
        quillEl.classList.remove('writing');dotEl.classList.remove('writing');
        const twR=tw.getBoundingClientRect();
        ctaWrapEl.style.top=Math.round(Math.min(twR.bottom+32,window.innerHeight-120))+'px';
        ctaWrapEl.classList.add('on');
        const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;
        quillEl.classList.add('resting');isParked=true;
      }
    }

    if(started){qx+=(tNibX-qx)*NIB_LERP;qy+=(tNibY-qy)*NIB_LERP;placeQuill(qx,qy);}

    prevVirtual=virtualScroll;
    requestAnimationFrame(loop);
  }

  /* ═══ INIT ════════════════════════════════════════════════ */
  window.addEventListener('load',function(){
    const ie=inkwellEntry();
    qx=ie.x;qy=ie.y;tNibX=ie.x;tNibY=ie.y;placeQuill(qx,qy);

    setTimeout(()=>{inkwellEl.classList.add('vis');plblEl.classList.add('vis');progEl.classList.add('vis');},180);
    setTimeout(()=>{quillEl.classList.add('vis');quillEl.classList.add('dipping');},320);
    setTimeout(()=>{const ie2=inkwellEntry();spawnDrops(ie2.x,ie2.y+10,4,7);},680);
    setTimeout(()=>{scrollHintEl.classList.add('vis');},200);
    setTimeout(()=>{
      quillEl.classList.remove('dipping');quillEl.classList.add('resting');isParked=true;
      inkRule.classList.add('expanded');
    },1380);
    setTimeout(()=>{hintEl.classList.add('vis');started=true;},1950);
  });

  /* Responsive : recalculer taille plume au resize */
  window.addEventListener('resize',()=>{
    applyQuillSize();
    if(isParked){const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;qx=ie.x;qy=ie.y;placeQuill(qx,qy);}
  });

  requestAnimationFrame(loop);
  </script>

  <script>
    (function(){
      var l=document.getElementById('page-loader');if(!l)return;
      function hide(){l.classList.add('is-hidden');setTimeout(function(){l.remove();},600);}
      if(document.readyState==='complete'){setTimeout(hide,120);}
      else{window.addEventListener('load',function(){setTimeout(hide,120);});}
    })();
  </script>
</body>
</html>
