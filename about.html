  <style>
    /* ─── BASE ───────────────────────────────────────────────── */
    body.page-about {
      background: #FDFCF9;
      overflow: hidden;      /* scroll virtuel : pas de défilement natif */
      height: 100%;
    }

    /* ─── ENCRIER ────────────────────────────────────────────── */
    /* Décalé plus bas (~2 pouces de plus que la version précédente) */
    #inkwell {
      position: fixed; top: 220px; left: 50%; transform: translateX(-50%);
      z-index: 45; opacity: 0; transition: opacity .7s ease; pointer-events: none;
    }
    #inkwell.vis { opacity: 1; }

    /* ─── PHRASE ITALIQUE (au-dessus du séparateur) ──────────── */
    #sub-hint {
      position: fixed; top: 283px; left: 50%; transform: translateX(-50%);
      font-family: 'Playfair Display', Georgia, serif; font-style: italic;
      font-size: .7rem; letter-spacing: .04em; color: rgba(30,26,20,.38);
      white-space: nowrap; z-index: 44; opacity: 0; pointer-events: none;
      transition: opacity 1s ease 1.6s;
    }
    #sub-hint.vis  { opacity: 1; }
    #sub-hint.gone { opacity: 0; transition: opacity .5s ease; }

    /* ─── SÉPARATEUR ─────────────────────────────────────────── */
    #ink-rule {
      position: fixed; top: 299px; left: 50%; transform: translateX(-50%);
      height: 1px; width: 0; background: rgba(28,24,20,.10); z-index: 44;
      transition: width 1.6s cubic-bezier(.22,1,.36,1) .6s;
    }
    #ink-rule.expanded { width: min(460px, 82vw); }

    /* ─── STAGE ──────────────────────────────────────────────── */
    /*
      MASQUE BLANC : ::before de 374px de haut.
      Blanc opaque sur 88 % (≈ 329px), puis fondu vers transparent.
      329px > bas de l'encrier (220+56=276px) → le texte remontant
      est systématiquement caché derrière ce masque.
      Les éléments externes (encrier z-45, plume z-55) flottent
      au-dessus de #stage (z-30) : toujours visibles.
    */
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 360px 2.5rem 8rem;
      z-index: 30; pointer-events: none; overflow: hidden;
    }
    #stage::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 374px;
      background: linear-gradient(to bottom, #FDFCF9 0%, #FDFCF9 88%, transparent 100%);
      pointer-events: none; z-index: 2;
    }
    #stage::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 7rem;
      background: linear-gradient(to bottom, transparent, #FDFCF9 72%);
      pointer-events: none; z-index: 2;
    }

    /* ─── TEXTE ──────────────────────────────────────────────── */
    #tw {
      max-width: 600px; width: 100%; text-align: center;
      font-family: 'Playfair Display', 'Young Serif', Georgia, serif;
      font-size: clamp(1.05rem, 1.85vw, 1.55rem); line-height: 1.88;
      color: #1E1A14; font-style: italic;
      will-change: transform; position: relative; z-index: 1;
    }
    #tw p { margin-top: 1.05em; }
    #tw p:first-child { margin-top: 0; }

    /* CHARS — invisibles au départ */
    .c   { color: #FDFCF9; transition: color .05s linear; }
    .c.v { color: #1E1A14; }

    /*
      EFFACEMENT COMPLET au scroll-up :
      encre qui se délave jusqu'à complète transparence,
      avec un léger flou pendant la transition (effet dilution).
    */
    .c.trace {
      color: #FDFCF9;                  /* totalement invisible = fond */
      filter: blur(.6px);
      transition: color .55s ease, filter .55s ease;
    }

    /* ─── RATURES ────────────────────────────────────────────── */
    .sg-wrap  { display: inline-block; position: relative; vertical-align: baseline; }
    .sg-inner { display: inline; }
    .sk-svg   { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 100%; height: 10px; overflow: visible; pointer-events: none; }
    .sk-l1 { stroke:#1E1A14;stroke-width:1.5;stroke-dasharray:108;stroke-dashoffset:108; }
    .sk-l2 { stroke:#1E1A14;stroke-width:.7;stroke-dasharray:108;stroke-dashoffset:108;opacity:.55; }
    .sg-wrap.struck .sk-l1 { animation:sk-draw1 .76s cubic-bezier(.4,0,.2,1) .22s forwards; }
    .sg-wrap.struck .sk-l2 { animation:sk-draw2 .52s cubic-bezier(.4,0,.2,1) .60s forwards; }
    @keyframes sk-draw1{0%{stroke-dashoffset:108}40%{stroke-dashoffset:46}50%{stroke-dashoffset:44}100%{stroke-dashoffset:0}}
    @keyframes sk-draw2{0%{stroke-dashoffset:108}100%{stroke-dashoffset:0}}

    /* ─── PLUME ──────────────────────────────────────────────── */
    #quill {
      position: fixed; width: 56px; height: 172px; pointer-events: none;
      z-index: 55; opacity: 0; transform-origin: 50% 98.3%; transform: rotate(-28deg);
      transition: opacity .9s ease; will-change: left, top; overflow: visible;
    }
    #quill.vis { opacity: 1; }
    @keyframes qwob{
      0%  {transform:rotate(-27.0deg) translateY(0.0px)}
      14% {transform:rotate(-30.5deg) translateY(0.4px)}
      28% {transform:rotate(-28.0deg) translateY(0.1px)}
      42% {transform:rotate(-31.0deg) translateY(0.6px)}
      57% {transform:rotate(-26.5deg) translateY(-0.2px)}
      72% {transform:rotate(-29.5deg) translateY(0.3px)}
      86% {transform:rotate(-27.5deg) translateY(0.0px)}
      100%{transform:rotate(-27.0deg) translateY(0.0px)}
    }
    #quill.writing { animation: qwob 1.15s ease-in-out infinite; }
    @keyframes qdip{
      0%  {transform:rotate(-28deg) translateY(0)}
      28% {transform:rotate(-25deg) translateY(15px)}
      55% {transform:rotate(-25deg) translateY(12px)}
      74% {transform:rotate(-27deg) translateY(5px)}
      100%{transform:rotate(-28deg) translateY(0)}
    }
    #quill.dipping { animation: qdip 1.2s cubic-bezier(.4,0,.2,1) forwards; }
    /* Plume au repos (rangée dans l'encrier, respiration douce) */
    @keyframes qrest{
      0%,100%{transform:rotate(-28deg) translateY(0)}
      50%    {transform:rotate(-29.5deg) translateY(1.5px)}
    }
    #quill.resting { animation: qrest 3.2s ease-in-out infinite; }
    @keyframes flamme{0%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(.7) scaleY(1.35) translateY(-1px)}100%{transform:scaleX(1) scaleY(1)}}
    @keyframes encre-pulse{0%,72%,100%{opacity:0}42%,55%{opacity:.85}}

    /* ─── DOT ────────────────────────────────────────────────── */
    #dot{position:fixed;width:3px;height:3px;border-radius:50%;background:#1E1A14;transform:translate(-50%,-50%);pointer-events:none;z-index:56;left:-50px;top:-50px;opacity:0;transition:opacity .3s}
    #dot.vis{opacity:.55}
    @keyframes dblink{0%,44%{opacity:.55}50%,100%{opacity:0}}
    #dot.writing{animation:dblink 1s steps(1) infinite}

    /* ─── DROPS ──────────────────────────────────────────────── */
    #drops-layer{position:fixed;inset:0;pointer-events:none;z-index:54;overflow:hidden}
    .ink-drop{position:absolute;border-radius:50%;background:#1C1610}

    /* ─── SIGNATURE ──────────────────────────────────────────── */
    #sig-svg{position:fixed;left:50%;transform:translateX(-50%);width:200px;height:62px;z-index:36;pointer-events:none;display:none;overflow:visible}
    #sig-path{fill:none;stroke:#1E1A14;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

    /* ─── CTA — carte mise en valeur ─────────────────────────── */
    #cta {
      position: fixed; left: 50%; transform: translateX(-50%);
      opacity: 0; pointer-events: none;
      transition: opacity 1.6s ease;
      z-index: 38; white-space: nowrap;
    }
    #cta.on { opacity: 1; pointer-events: all; }

    .cta-card {
      display: flex; flex-direction: column; align-items: center; gap: .55rem;
      background: #1E1A14;
      border: 1px solid rgba(176,132,90,.28);
      padding: 1.7rem 3.2rem 1.5rem;
      text-decoration: none;
      min-width: 240px;
      position: relative;
      transition: transform .45s cubic-bezier(.22,1,.36,1),
                  box-shadow .45s ease,
                  border-color .45s ease;
    }
    .cta-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(28,22,14,.38);
      border-color: rgba(176,132,90,.55);
    }
    /* Filet doré ornemental en haut et en bas de la carte */
    .cta-ornament {
      display: block;
      width: 100%;
    }
    .cta-card-label {
      font-family: 'Bitter', serif; font-size: .68rem;
      letter-spacing: .34em; text-transform: uppercase;
      color: #FDFCF9; margin: .1rem 0;
    }
    .cta-card-sub {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: .6rem; letter-spacing: .18em;
      color: rgba(253,252,249,.42);
    }
    .cta-arrow-wrap { margin-top: .2rem; }

    /* ─── PAGE LABEL ─────────────────────────────────────────── */
    #plbl{position:fixed;top:1.5rem;right:2rem;font-family:'Bitter',serif;font-size:.52rem;letter-spacing:.36em;text-transform:uppercase;color:rgba(30,26,20,.22);white-space:nowrap;z-index:20;opacity:0;transition:opacity .9s ease}
    #plbl.vis{opacity:1}

    /* ─── PROGRESS ───────────────────────────────────────────── */
    #prog{position:fixed;left:1.8rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;z-index:20;opacity:0;transition:opacity .9s ease}
    #prog.vis{opacity:1}
    .pd{width:3px;height:3px;border-radius:50%;background:rgba(30,26,20,.14);transition:background .4s ease,transform .4s ease}
    .pd.on{background:rgba(30,26,20,.52);transform:scale(1.3)}

    /* ─── SCROLL HINT (plus visible) ────────────────────────── */
    #hint {
      position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: .65rem;
      z-index: 20; opacity: 0; pointer-events: none; transition: opacity .6s ease;
    }
    #hint.vis  { opacity: 1; }
    #hint.gone { display: none; }

    /* Texte agrandi et bien visible */
    .hint-label {
      font-family: 'Playfair Display', Georgia, serif; font-style: italic;
      font-size: .88rem;           /* 63 % plus grand qu'avant */
      letter-spacing: .12em;
      color: rgba(30,26,20,.58);   /* plus sombre */
      white-space: nowrap;
    }
    .hint-line {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, rgba(30,26,20,.35), transparent);
    }
    /* Flèche SVG animée sous le texte */
    .hint-arrow {
      animation: hint-bob 2.2s ease-in-out infinite;
    }
    @keyframes hint-bob{
      0%,100%{transform:translateY(0)}
      50%    {transform:translateY(5px)}
    }
    @keyframes hpulse{
      0%,100%{opacity:.45;transform:translateX(-50%) translateY(0)}
      50%    {opacity:1;  transform:translateX(-50%) translateY(-4px)}
    }
    #hint.vis { animation: hpulse 2.8s ease-in-out 1s infinite; }

    /* ─── BLOTS ──────────────────────────────────────────────── */
    .ink-blot{position:fixed;pointer-events:none;z-index:3;overflow:visible}

    body.page-about .site-footer { display: none; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width:680px){
      #inkwell  { top: 140px; }
      #sub-hint { top: 202px; }
      #ink-rule { top: 218px; }
      #stage    { padding: 274px 1.5rem 7rem; }
      #stage::before { height: 286px; }
      #tw       { font-size: clamp(.98rem,5vw,1.22rem); line-height:1.78; }
      #quill    { width: 44px; height: 136px; }
      #prog,#plbl { display:none; }
      .cta-card { padding: 1.3rem 2rem 1.2rem; min-width:200px; }
    }
    @media (max-width:380px){ #stage { padding:262px 1.2rem 6rem; } }
  </style>
</head>

  <script>
  'use strict';

  /* ═══════════════════════════════════════════════════════════
     SCROLL VIRTUEL — anti-scroll-rapide
     Prend le contrôle complet de la molette, de la touche
     clavier et du touch. La vitesse est plafonnée par
     MAX_WHEEL_STEP et lissée par SCROLL_LERP.
     Plus de window.scrollY — pas de conflit avec la hauteur
     du body ou la restauration de scroll du navigateur.
  ═══════════════════════════════════════════════════════════ */
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  const VIRT_DIST     = 6400; /* distance virtuelle totale */
  const WHEEL_FACTOR  = 0.38; /* atténuation de la molette */
  const MAX_WHEEL_STEP= 78;   /* plafond par événement wheel (px virtuels) */
  const SCROLL_LERP   = 0.068;/* lissage position virtuelle */

  let scrollTarget  = 0;
  let virtualScroll = 0;
  let prevVirtual   = 0;

  /* Molette */
  window.addEventListener('wheel', e => {
    e.preventDefault();
    const step = Math.sign(e.deltaY) *
                 Math.min(Math.abs(e.deltaY) * WHEEL_FACTOR, MAX_WHEEL_STEP);
    scrollTarget = Math.max(0, Math.min(VIRT_DIST, scrollTarget + step));
  }, { passive: false });

  /* Clavier */
  window.addEventListener('keydown', e => {
    const STEP = 130;
    if ([' ', 'ArrowDown', 'PageDown'].includes(e.key)) {
      e.preventDefault(); scrollTarget = Math.min(VIRT_DIST, scrollTarget + STEP);
    } else if (['ArrowUp', 'PageUp'].includes(e.key)) {
      e.preventDefault(); scrollTarget = Math.max(0, scrollTarget - STEP);
    } else if (e.key === 'Home') {
      e.preventDefault(); scrollTarget = 0;
    } else if (e.key === 'End') {
      e.preventDefault(); scrollTarget = VIRT_DIST;
    }
  });

  /* Touch */
  let touchY0 = null;
  window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (touchY0 === null) return;
    const dy = (touchY0 - e.touches[0].clientY) * 1.15;
    touchY0 = e.touches[0].clientY;
    scrollTarget = Math.max(0, Math.min(VIRT_DIST, scrollTarget + dy));
  }, { passive: true });
  window.addEventListener('touchend', () => { touchY0 = null; }, { passive: true });

  /* ═══════════════════════════════════════════════════════════
     CONTENU
  ═══════════════════════════════════════════════════════════ */
  const PARAGRAPHS = [
    {lines:[[{t:'tx',v:'Je suis photographe\u00a0\u2014\u00a0'},{t:'sk',v:'quelqu\u2019un qui d\u00e9clenche au hasard',id:'s0'},{t:'tx',v:'. Quelqu\u2019un qui choisit.'}]]},
    {lines:[[{t:'tx',v:'Quelqu\u2019un qui attend\u00a0\u2014\u00a0'},{t:'sk',v:'quelqu\u2019un qui force les choses',id:'s1'},{t:'tx',v:'.'}],[{t:'tx',v:'Que la lumi\u00e8re, le sujet et le moment coexistent.'}]]},
    {lines:[[{t:'tx',v:'J\u2019ai toujours aim\u00e9 la photographie\u00a0\u2014\u00a0'},{t:'sk',v:'une passion r\u00e9cente',id:'s2'},{t:'tx',v:'.'}],[{t:'tx',v:'Mais j\u2019ai r\u00e9ellement commenc\u00e9 en 2023.'}]]},
    {lines:[[{t:'tx',v:'J\u2019ai commenc\u00e9 l\u2019orgue \u00e0 l\u2019\u00e2ge de six ans\u00a0\u2014\u00a0'},{t:'sk',v:'seulement un parcours classique',id:'s3'},{t:'tx',v:'.'}],[{t:'tx',v:'J\u2019ai toujours \u00e9t\u00e9 profond\u00e9ment sensible \u00e0 l\u2019art.'}]]},
    {lines:[[{t:'sk',v:'Cette fa\u00e7on d\u2019\u00e9couter avant de regarder ne m\u2019a jamais quitt\u00e9',id:'s4'},{t:'tx',v:'. Elle est devenue mon regard\u00a0\u2014\u00a0'},{t:'sk',v:'juste une mani\u00e8re de voir',id:'s5'},{t:'tx',v:'.'}]]},
    {lines:[[{t:'tx',v:'L\u2019image est pour moi une fa\u00e7on\u00a0\u2014\u00a0'},{t:'sk',v:'faire de jolies photos',id:'s6'},{t:'tx',v:'.'}],[{t:'tx',v:'De partager ce que je trouve beau.'}]]},
    {lines:[[{t:'tx',v:'Une mani\u00e8re\u00a0\u2014\u00a0'},{t:'sk',v:'suivre des tendances',id:'s7'},{t:'tx',v:'.'}],[{t:'tx',v:'De rendre visible ce qui pourrait passer inaper\u00e7u.'}]]},
    {lines:[[{t:'tx',v:'J\u2019ai r\u00e9alis\u00e9 de nombreuses prestations priv\u00e9es.'}],[{t:'tx',v:'Chaque rencontre. Nourrit ma fa\u00e7on de travailler.'}]]},
    {lines:[[{t:'tx',v:'C\u2019est important\u00a0\u2014\u00a0'},{t:'sk',v:'imposer un style',id:'s8'},{t:'tx',v:'.'}],[{t:'tx',v:'Parce que je peux y apporter ma vision.'}]]},
    {lines:[[{t:'tx',v:'Je m\u2019adapte\u00a0\u2014\u00a0'},{t:'sk',v:'appliquer une recette',id:'s9'},{t:'tx',v:'. Toujours aux personnes, aux lieux, aux attentes.'}]]},
    {lines:[[{t:'tx',v:'Une pr\u00e9sence\u00a0\u2014\u00a0'},{t:'sk',v:'une mise en sc\u00e8ne permanente',id:'s10'},{t:'tx',v:'. Discr\u00e8te, une attention.'}]]},
    {lines:[[{t:'tx',v:'Je souhaite travailler\u00a0\u2014\u00a0'},{t:'sk',v:'remplir un feed',id:'s11'},{t:'tx',v:'.'}],[{t:'tx',v:'Pour des musiciens, des lieux, des projets.'}]]},
    {lines:[[{t:'tx',v:'Pour ce qui a du sens\u00a0\u2014\u00a0'},{t:'sk',v:'produire \u00e0 vide',id:'s12'},{t:'tx',v:'. Une n\u00e9cessit\u00e9.'}]]},
    {lines:[[{t:'tx',v:'Je veux\u00a0\u2014\u00a0'},{t:'sk',v:'tout montrer',id:'s13'},{t:'tx',v:'. Tout ce qui m\u00e9rite d\u2019\u00eatre vu.'}]]},
    {lines:[[{t:'tx',v:'Je cherche\u00a0\u2014\u00a0'},{t:'sk',v:'la perfection',id:'s14'},{t:'tx',v:'. Tout ce que je peux faire avec justesse.'}]]}
  ];

  /* ─── BUILD DOM ─────────────────────────────────────────── */
  const tw=document.getElementById('tw'),spans=[],triggers=[];
  let total=0;
  const paraCharEnds=[];
  const NS='http://www.w3.org/2000/svg';

  PARAGRAPHS.forEach(para=>{
    const p=document.createElement('p');
    para.lines.forEach((line,li)=>{
      if(li>0)p.appendChild(document.createElement('br'));
      line.forEach(seg=>{
        if(seg.t==='tx'){
          for(const ch of seg.v){const s=document.createElement('span');s.className='c';s.textContent=ch;p.appendChild(s);spans.push(s);total++;}
        }else{
          const w=document.createElement('span');w.className='sg-wrap';w.id=seg.id;
          const inn=document.createElement('span');inn.className='sg-inner';
          for(const ch of seg.v){const s=document.createElement('span');s.className='c';s.textContent=ch;inn.appendChild(s);spans.push(s);total++;}
          w.appendChild(inn);
          const sv=document.createElementNS(NS,'svg');sv.setAttribute('class','sk-svg');sv.setAttribute('viewBox','0 0 100 10');sv.setAttribute('preserveAspectRatio','none');sv.setAttribute('aria-hidden','true');
          const l1=document.createElementNS(NS,'path');l1.setAttribute('class','sk-l1');l1.setAttribute('d','M1,5 C18,3 38,6.5 52,4 C66,1.5 82,5.8 99,4.2');l1.setAttribute('fill','none');l1.setAttribute('stroke-linecap','round');
          const l2=document.createElementNS(NS,'path');l2.setAttribute('class','sk-l2');l2.setAttribute('d','M2,5.8 C22,7.2 42,3.2 62,5.5 C78,7.2 93,3.5 98,5.2');l2.setAttribute('fill','none');l2.setAttribute('stroke-linecap','round');
          sv.appendChild(l1);sv.appendChild(l2);w.appendChild(sv);p.appendChild(w);
          triggers.push({at:total-1,id:seg.id});
        }
      });
    });
    paraCharEnds.push(total);tw.appendChild(p);
  });

  const progEl=document.getElementById('prog');
  PARAGRAPHS.forEach((_,i)=>{const d=document.createElement('div');d.className='pd';d.id='pd'+i;progEl.appendChild(d);});

  /* ─── REFS ──────────────────────────────────────────────── */
  const quillEl=document.getElementById('quill'),dotEl=document.getElementById('dot'),
        inkwellEl=document.getElementById('inkwell'),inkRule=document.getElementById('ink-rule'),
        subHintEl=document.getElementById('sub-hint'),hintEl=document.getElementById('hint'),
        ctaEl=document.getElementById('cta'),plblEl=document.getElementById('plbl'),
        sigSvgEl=document.getElementById('sig-svg'),sigPathEl=document.getElementById('sig-path'),
        dropsLayer=document.getElementById('drops-layer');

  const NIB_X=28,NIB_Y=169;
  function inkwellEntry(){const r=inkwellEl.getBoundingClientRect();return{x:r.left+r.width*.5,y:r.top+r.height*.28};}
  let qx=0,qy=0;
  function placeQuill(nx,ny){quillEl.style.left=(nx-NIB_X)+'px';quillEl.style.top=(ny-NIB_Y)+'px';dotEl.style.left=nx+'px';dotEl.style.top=ny+'px';}

  /* ─── DROPS ─────────────────────────────────────────────── */
  function spawnDrops(x,y,count,spread){
    spread=spread||8;
    for(let i=0;i<count;i++){
      const el=document.createElement('div');
      const size=1.2+Math.random()*2.8,dx=(Math.random()-.5)*spread*2;
      const fall=10+Math.random()*18,dur=.4+Math.random()*.45,opa=.28+Math.random()*.35;
      el.className='ink-drop';
      el.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(x+dx-size/2)+'px;top:'+(y-size/2)+'px;opacity:'+opa+';transition:transform '+dur+'s cubic-bezier(.2,.8,.4,1),opacity '+(dur+.12)+'s ease;';
      dropsLayer.appendChild(el);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.transform='translateY('+fall+'px)';el.style.opacity='0';}));
      setTimeout(()=>el.remove(),(dur+.35)*1000);
    }
  }

  /* ─── DIPPING ────────────────────────────────────────────── */
  let isDipping=false,lastDippedPara=-1,isParked=false;
  const DIP_AT=[3,7,11];
  function getParaIdx(n){for(let i=0;i<paraCharEnds.length;i++)if(n<=paraCharEnds[i])return i;return paraCharEnds.length;}

  function triggerDip(isReturn){
    if(isDipping)return;isDipping=true;isParked=false;
    const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;
    quillEl.classList.add('dipping');
    quillEl.classList.remove('writing','resting');
    dotEl.classList.remove('vis','writing');
    setTimeout(()=>spawnDrops(ie.x,ie.y+10,isReturn?2:3,5),360);
    setTimeout(()=>spawnDrops(ie.x,ie.y+4,2,3),500);
    setTimeout(()=>{
      quillEl.classList.remove('dipping');
      isDipping=false;
      /* Si c'est un retour (scroll-up terminé), rester au repos */
      if(isReturn){quillEl.classList.add('resting');isParked=true;}
    },1250);
  }

  /* ─── WRITING DROPS ──────────────────────────────────────── */
  let wdc=0;
  function maybeWriteDrop(n){
    if(++wdc<32)return;wdc=0;
    const wp=writingPos(n);if(wp)spawnDrops(wp.x,wp.y+1,1,3);
  }

  /* ─── VIEWPORT TRACKING ──────────────────────────────────── */
  let twY=0,targetTwY=0;
  const TW_LERP=.042,WRITE_ZONE=.56;

  function updateTwPosition(n){
    if(n<=0){targetTwY=0;return;}
    if(n>=total)return;
    const wp=writingPos(Math.min(n,spans.length-1));
    if(!wp)return;
    const zoneY=window.innerHeight*WRITE_ZONE;
    if(wp.y>zoneY)     { targetTwY=Math.min(0,zoneY-(wp.y-twY)); }
    else if(wp.y<zoneY*.35&&targetTwY<0){ targetTwY=Math.min(0,zoneY-(wp.y-twY)); }
  }

  /* ─── INDEX ──────────────────────────────────────────────── */
  function targetIdx(){return(virtualScroll/VIRT_DIST)*total;}

  /* ─── SYNC CHARS ─────────────────────────────────────────── */
  let revN=0;
  function syncChars(n){
    if(n>revN){for(let i=revN;i<n&&i<spans.length;i++){spans[i].classList.add('v');spans[i].classList.remove('trace');}}
    else if(n<revN){for(let i=revN-1;i>=n&&i>=0;i--){spans[i].classList.remove('v');spans[i].classList.add('trace');}}
    revN=Math.max(0,Math.min(n,spans.length));
  }

  /* ─── TRIGGERS ───────────────────────────────────────────── */
  const fired=new Set();
  function checkTriggers(n){
    triggers.forEach((tr,i)=>{
      const el=document.getElementById(tr.id);if(!el)return;
      if(n>tr.at){if(!fired.has(i)){fired.add(i);setTimeout(()=>el.classList.add('struck'),260);}}
      else{if(fired.has(i)){fired.delete(i);el.classList.remove('struck');}}
    });
  }

  /* ─── WRITING POSITION ───────────────────────────────────── */
  function writingPos(n){
    const i=Math.min(n,spans.length-1);if(i<0)return null;
    const r=spans[i].getBoundingClientRect();
    if(r.width>.5)return{x:r.left+r.width*.2,y:r.top+r.height*.68};
    for(let j=i-1;j>=0;j--){const rj=spans[j].getBoundingClientRect();if(rj.width>.5)return{x:rj.right+1,y:rj.top+rj.height*.68};}
    return null;
  }

  function updateProg(n){paraCharEnds.forEach((end,i)=>{const d=document.getElementById('pd'+i);if(d)d.classList.toggle('on',n>=end);});}

  /* ─── SIGNATURE ──────────────────────────────────────────── */
  let sigActive=false,sigRafId=null;
  function startSignature(){
    const twR=tw.getBoundingClientRect();
    sigSvgEl.style.top=Math.round(twR.bottom+22)+'px';sigSvgEl.style.bottom='auto';sigSvgEl.style.display='block';
    const pl=sigPathEl.getTotalLength();
    sigPathEl.style.strokeDasharray=pl;sigPathEl.style.strokeDashoffset=pl;
    const pt0=sigPathEl.getPointAtLength(0),ctm0=sigSvgEl.getScreenCTM();
    tNibX=ctm0.a*pt0.x+ctm0.c*pt0.y+ctm0.e;tNibY=ctm0.b*pt0.x+ctm0.d*pt0.y+ctm0.f;
    setTimeout(()=>{
      sigActive=true;let t0=null;const DUR=3400;
      function sl(ts){
        if(!t0)t0=ts;const t=Math.min(1,(ts-t0)/DUR);
        const et=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
        sigPathEl.style.strokeDashoffset=pl*(1-et);
        const pt=sigPathEl.getPointAtLength(et*pl),c=sigSvgEl.getScreenCTM();
        tNibX=c.a*pt.x+c.c*pt.y+c.e;tNibY=c.b*pt.x+c.d*pt.y+c.f;
        if(t<1){sigRafId=requestAnimationFrame(sl);}
        else{
          sigActive=false;sigRafId=null;
          const sr=sigSvgEl.getBoundingClientRect();
          ctaEl.style.top=(sr.bottom+20)+'px';ctaEl.style.bottom='auto';
          const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;
          quillEl.classList.remove('writing');quillEl.classList.add('resting');
          setTimeout(()=>ctaEl.classList.add('on'),900);
        }
      }
      sigRafId=requestAnimationFrame(sl);
    },480);
  }

  /* ─── MAIN LOOP ──────────────────────────────────────────── */
  let curIdx=0,tNibX=0,tNibY=0,done=false,started=false;

  /* Fluidité : IDX_LERP réduit = transitions plus douces */
  const IDX_LERP=0.072;
  const NIB_LERP=0.18;

  /* Gestion du retour plume à l'encrier */
  let returnQuillTimer=null;
  let quillReturnPending=false;

  function scheduleQuillReturn(){
    if(quillReturnPending)return;
    quillReturnPending=true;
    clearTimeout(returnQuillTimer);
    returnQuillTimer=setTimeout(()=>{
      /* Si on est toujours en scroll-up après 300ms, lancer le retour */
      if(virtualScroll<prevVirtual+2&&!isDipping&&!sigActive&&started){
        triggerDip(true);/* retour encrier avec animation */
      }
      quillReturnPending=false;
    },320);
  }

  function loop(){
    /* ─ Scroll virtuel ─ */
    virtualScroll+=(scrollTarget-virtualScroll)*SCROLL_LERP;
    const scrollingBack=virtualScroll<prevVirtual-0.1;

    const ti=targetIdx();
    curIdx+=(ti-curIdx)*IDX_LERP;
    const n=Math.round(curIdx);

    if(started){
      syncChars(n);
      checkTriggers(n);
      updateProg(n);
      updateTwPosition(n);

      /* Cache le hint dès qu'on scrolle */
      if(scrollTarget>15){hintEl.classList.add('gone');}
    }

    /* translateY fluidifié */
    twY+=(targetTwY-twY)*TW_LERP;
    tw.style.transform='translateY('+twY.toFixed(2)+'px)';

    if(started){
      if(n<=0){
        /* Retour au début absolu */
        if(!isParked){quillEl.classList.remove('writing');quillEl.classList.add('resting');dotEl.classList.remove('vis','writing');isParked=true;}
        const ie=inkwellEntry();tNibX=ie.x;tNibY=ie.y;

      }else if(n<total&&!done){

        if(scrollingBack){
          /* SCROLL UP : plume retourne à l'encrier avec fluidité */
          quillEl.classList.remove('writing');
          dotEl.classList.remove('writing');
          isParked=false;
          /* Retour rapide vers l'encrier */
          const ie=inkwellEntry();
          tNibX+=(ie.x-tNibX)*.055;
          tNibY+=(ie.y-tNibY)*.055;
          /* Planifier un ancrage dans l'encrier si le scroll s'arrête */
          scheduleQuillReturn();
          lastDippedPara=Math.min(lastDippedPara,getParaIdx(n)-1);

        }else{
          /* SCROLL AVANT : écriture */
          quillReturnPending=false;clearTimeout(returnQuillTimer);
          isParked=false;
          if(!isDipping&&!sigActive){
            const np=getParaIdx(n);
            if(DIP_AT.indexOf(np)!==-1&&lastDippedPara<np){lastDippedPara=np;triggerDip(false);}
          }
          if(!isDipping){
            const wp=writingPos(n);if(wp){tNibX=wp.x;tNibY=wp.y;}
            quillEl.classList.add('writing');quillEl.classList.remove('resting');
            dotEl.classList.add('vis','writing');
            maybeWriteDrop(n);
          }
        }

      }else if(n>=total&&!done){
        done=true;quillEl.classList.remove('writing');dotEl.classList.remove('writing');
        setTimeout(startSignature,520);
      }

      /* Annulation fin au scroll-up */
      if(done&&n<total){
        done=false;
        if(sigRafId){cancelAnimationFrame(sigRafId);sigRafId=null;}
        sigActive=false;
        sigSvgEl.style.display='none';sigSvgEl.style.top='';
        if(sigPathEl.getTotalLength)sigPathEl.style.strokeDashoffset=sigPathEl.getTotalLength();
        ctaEl.classList.remove('on');ctaEl.style.top='';ctaEl.style.bottom='';
        hintEl.classList.remove('gone');hintEl.classList.add('vis');
        quillEl.classList.remove('resting');
      }

      qx+=(tNibX-qx)*NIB_LERP;
      qy+=(tNibY-qy)*NIB_LERP;
      placeQuill(qx,qy);
    }

    prevVirtual=virtualScroll;
    requestAnimationFrame(loop);
  }

  /* ─── INIT ──────────────────────────────────────────────── */
  window.addEventListener('load',function(){
    const ie=inkwellEntry();
    qx=ie.x;qy=ie.y;tNibX=ie.x;tNibY=ie.y;placeQuill(qx,qy);

    setTimeout(()=>{inkwellEl.classList.add('vis');plblEl.classList.add('vis');progEl.classList.add('vis');},180);
    setTimeout(()=>{quillEl.classList.add('vis');quillEl.classList.add('dipping');},320);
    setTimeout(()=>{const ie2=inkwellEntry();spawnDrops(ie2.x,ie2.y+10,4,7);},680);
    setTimeout(()=>{
      quillEl.classList.remove('dipping');
      quillEl.classList.add('resting'); /* repos dans l'encrier */
      isParked=true;
      inkRule.classList.add('expanded');
      subHintEl.classList.add('vis');
    },1380);
    setTimeout(()=>{
      hintEl.classList.add('vis');
      started=true;
    },1950);
  });

  requestAnimationFrame(loop);
  </script>

  <script>
    (function(){
      var l=document.getElementById('page-loader');if(!l)return;
      function hide(){l.classList.add('is-hidden');setTimeout(function(){l.remove();},600);}
      if(document.readyState==='complete'){setTimeout(hide,120);}
      else{window.addEventListener('load',function(){setTimeout(hide,120);});}
    })();
  </script>
</body>
